<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>오빠야 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
<style>

body {
  margin: 0;
  font-family: 'Noto Sans KR', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* 헤더 */
.header {
  background: #020617;
  padding: 20px 40px;
  border-bottom: 1px solid #1e293b;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.nav a {
  margin-left: 20px;
  color: #94a3b8;
  text-decoration: none;
}

.nav a:hover {
  color: white;
}

/* 메인 */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px;
}

/* 헤드라인 */
.headline {
  background: linear-gradient(135deg, #1e293b, #020617);
  padding: 30px;
  border-radius: 16px;
  margin-bottom: 30px;
}

.headline h1 {
  margin: 0;
}

/* 뉴스 카드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 14px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.08);
}

/* 푸터 */
.footer {
  text-align: center;
  padding: 30px;
  color: #64748b;
}

</style>
</head>

<body>

<!-- 헤더 -->
<div class="header">
  <div class="logo">📰 오빠야 브리핑</div>
  <div class="nav">
    <a href="#">소개</a>
    <a href="#">브리핑</a>
    <a href="#">자료실</a>
    <a href="#">연락처</a>
  </div>
</div>

<!-- 메인 -->
<div class="container">

  <!-- 헤드라인 -->
  <div class="headline">
    <h1>2026년 3월 정치·경제 브리핑</h1>
    <p>국내외 정세와 경제 흐름을 한눈에 정리했습니다.</p>
  </div>

  <!-- 뉴스 카드 -->
  <div class="grid">

    <div class="card">
      <h3>정치 동향</h3>
      <p>대통령 지지율 안정세, 정당 간 격차 확대.</p>
    </div>

    <div class="card">
      <h3>경제 동향</h3>
      <p>중동 리스크 대응 비상경제체제 가동.</p>
    </div>

    <div class="card">
      <h3>북한 동향</h3>
      <p>군사 활동 강화, 전략 무력 강조 지속.</p>
    </div>

    <div class="card">
      <h3>세계 경제</h3>
      <p>금리 인상 우려로 글로벌 시장 약세.</p>
    </div>

  </div>

</div>

<!-- 푸터 -->
<div class="footer">
  © 2026 오빠야 브리핑 | All rights reserved
</div>

</body>
</html>
