<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>OBS12 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
<style>

body {
  margin: 0;
  font-family: 'Noto Sans KR', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
}

/* 헤더 */
.header {
  background: #020617;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #1e293b;
}

.logo {
  font-weight: bold;
  font-size: 22px;
}

.nav a {
  margin-left: 20px;
  color: #94a3b8;
  text-decoration: none;
}

/* 컨테이너 */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 30px;
}

/* 상단 뉴스 */
.top-news {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* 메인 뉴스 */
.main-news {
  background: linear-gradient(135deg, #1e293b, #020617);
  padding: 30px;
  border-radius: 16px;
}

.main-news h1 {
  margin: 0;
}

/* 사이드 뉴스 */
.side-news .item {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

/* 카테고리 */
.category {
  margin-top: 30px;
}

.category h2 {
  border-bottom: 1px solid #1e293b;
  padding-bottom: 10px;
}

/* 카드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  background: rgba(255,255,255,0.08);
  transform: translateY(-5px);
}

/* 푸터 */
.footer {
  text-align: center;
  padding: 30px;
  color: #64748b;
}

</style>
</head>

<body>

<!-- 헤더 -->
<div class="card">
  <h3><a href="news1.html">2026년 3월 정치·경제 브리핑</a></h3>
  <p>국내외 정세 요약</p>
</div>
  
<div class="header">
  <div class="logo">📰 OBS 브리핑</div>
  <div class="nav">
    <a href="#">정치</a>
    <a href="#">경제</a>
    <a href="#">국제</a>
    <a href="#">안보</a>
  </div>
</div>

<div class="container">

  <!-- 상단 뉴스 -->
  <div class="top-news">

    <!-- 메인 -->
    <div class="main-news">
      <h1>2026년 3월 정치·경제 핵심 브리핑</h1>
      <p>국내외 정세와 경제 흐름을 종합 분석한 주요 뉴스입니다.</p>
    </div>

    <!-- 사이드 -->
    <div class="side-news">
      <div class="item">대통령 지지율 60%대 유지</div>
      <div class="item">중동 리스크 대응 비상경제체제</div>
      <div class="item">글로벌 금리 인상 압박</div>
    </div>

  </div>

  <!-- 정치 -->
  <div class="category">
    <h2>정치</h2>
    <div class="grid">
      <div class="card">여야 지지율 격차 확대</div>
      <div class="card">정치권 갈등 지속</div>
    </div>
  </div>

  <!-- 경제 -->
  <div class="category">
    <h2>경제</h2>
    <div class="grid">
      <div class="card">추경 예산 추진</div>
      <div class="card">물가 안정 정책</div>
    </div>
  </div>

  <!-- 국제 -->
  <div class="category">
    <h2>국제</h2>
    <div class="grid">
      <div class="card">글로벌 증시 하락</div>
      <div class="card">달러 강세 지속</div>
    </div>
  </div>

</div>

<div class="footer">
  © 2026 오빠야 브리핑
</div>

</body>
</html>
